<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hosta Real-Time Monitor</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #f4f7f6; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #status { padding: 10px; margin-bottom: 20px; border-radius: 8px; font-weight: bold; text-align: center; }
        .connected { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .disconnected { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .controls { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; flex-grow: 1; }
        button { padding: 8px 16px; background: #17a2b8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #138496; }
        #messages { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 15px; background: #fafafa; border-radius: 8px; }
        .log-entry { margin-bottom: 10px; padding: 10px; border-radius: 6px; border-left: 4px solid #17a2b8; background: white; animation: slideIn 0.3s ease; }
        .event-booking { border-left-color: #28a745; background: #f0fff4; }
        .event-doctor { border-left-color: #ffc107; background: #fffbeb; }
        .event-emergency { border-left-color: #dc3545; background: #fff5f5; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        small { color: #888; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hosta Real-Time Monitor</h1>
        
        <div id="status" class="disconnected">Status: Disconnected</div>

        <div class="controls">
            <div>
                <label><strong>Target ID:</strong></label>
                <input type="text" id="targetId" placeholder="Enter ID (e.g., 104)">
            </div>
            <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px;">
                <button onclick="joinRoom('user')">Join as User</button>
                <button onclick="joinRoom('doctor')" style="background: #ffc107; color: black;">Join as Doctor</button>
                <button onclick="joinRoom('hospital')" style="background: #28a745;">Join as Hospital</button>
                <button onclick="joinRoom('staff')" style="background: #6c757d;">Join as Staff</button>
                <button onclick="joinRoom('admin')" style="background: #007bff;">Join as Admin</button>
                <button onclick="joinRoom('donor')" style="background: #e83e8c;">Join as Blood Donor</button>
                <button onclick="joinRoom('ambulance')" style="background: #fd7e14;">Join as Ambulance</button>
                <button onclick="joinRoom('role_1')" style="background: #dc3545;">Join as Superadmin</button>
            </div>
        </div>

        <div id="messages">
            <div class="log-entry">Waiting for events...</div>
        </div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const messagesDiv = document.getElementById('messages');
        const targetIdInput = document.getElementById('targetId');

        // Connect through the API Gateway (Port 3000)
        const socket = io('http://localhost:3000', { 
            transports: ['websocket'],
            upgrade: false 
        });

        socket.on('connect', () => {
            statusDiv.innerText = 'Status: Connected! (Socket ID: ' + socket.id + ')';
            statusDiv.className = 'connected';
            addLog('System', 'Connection established with API Gateway.');
            
            // ✅ Auto-rejoin the room if we have a Target ID saved
            const savedId = targetIdInput.value;
            if (savedId) {
                const roomName = `user_${savedId}`;
                socket.emit('join-room', roomName);
                addLog('System', `Automatically rejoined room: ${roomName}`);
            }
        });

        socket.on('connect_error', (err) => {
            console.error('Connection Error:', err);
            addLog('Error', `Connection failed: ${err.message}`, 'event-emergency');
        });

        socket.on('disconnect', () => {
            statusDiv.innerText = 'Status: Disconnected';
            statusDiv.className = 'disconnected';
            addLog('System', 'Lost connection to gateway.');
        });

        // 1. Listen for Booking Events
        socket.on('booking_created', (data) => {
            addLog('Booking', data.message || 'New booking received!', 'event-booking');
            console.log('Booking Data:', data);
        });

        // 2. Listen for Doctor Events
        socket.on('doctor_registered', (data) => {
            addLog('Doctor', data.message || 'A new doctor has joined the platform!', 'event-doctor');
            console.log('Doctor Data:', data);
        });

        // 3. Listen for Emergency Alerts
        socket.on('emergency_alert', (data) => {
            addLog('EMERGENCY', data.message || 'Global emergency alert!', 'event-emergency');
            console.log('Emergency Data:', data);
        });

        // 4. Listen for System Events (All other microservices)
        socket.on('system_event', (data) => {
            addLog('System Monitor', data.message || 'New system event!', 'event-doctor');
            console.log('System Event Data:', data);
        });

        function joinRoom(type) {
            const id = targetIdInput.value;
            
            let roomName = '';
            if (type === 'role_1') {
                roomName = 'role_1';
            } else if (!id) {
                return alert('Please enter a Target ID');
            } else {
                // Conventional room naming: user_<id>
                // This covers users, doctors, hospitals, staff, donors, and ambulances
                roomName = `user_${id}`;
            }
            
            socket.emit('join-room', roomName);
            addLog('System', `Joined room: ${roomName}. Now monitoring events for this ${type}.`);
        }

        function addLog(type, message, className = '') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${className}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<small>${time} - [${type}]</small><div>${message}</div>`;
            messagesDiv.prepend(entry);
        }
    </script>
</body>
</html>
